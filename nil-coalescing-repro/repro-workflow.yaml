apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: nil-coalesce-repro-
  namespace: argo
spec:
  entrypoint: main
  templates:
    - name: main
      steps:
        - - name: echo
            template: echo
            withItems:
              - { name: "a", optionalKey: "value" }
              - { name: "b" }
            arguments:
              parameters:
                - name: msg
                  value: "{{= item.optionalKey ?? 'fallback' }}"
    - name: echo
      inputs:
        parameters:
          - name: msg
      container:
        image: alpine:3.20
        command: [echo]
        args: ["{{inputs.parameters.msg}}"]
